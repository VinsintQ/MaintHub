<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background: #f1f1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 2.5em;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #000; margin-bottom: 0.5em; }
        p  { color: rgba(0,0,0,.5); margin-bottom: 1.5em; }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
            margin-bottom: 1em;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #30e3ca;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover { background: #26c4ad; }
        .message { margin-top: 1em; text-align: center; font-size: 14px; }
        .success { color: green; }
        .error   { color: red; }
    </style>
</head>
<body>
<div class="card">
    <h2>Reset your password</h2>

    <div th:if="${success}" class="message success" th:text="${success}"></div>
    <div th:if="${error}" class="message error" th:text="${error}"></div>

    <div th:if="${success == null}">
        <p>Enter your new password below.</p>
        <form th:action="@{/auth/users/resetPassword(token=${token})}" method="post">
            <input type="password" name="password" placeholder="New password" required minlength="6" />
            <button type="submit">Reset Password</button>
        </form>
    </div>
</div>
</body>
</html>
